name: Publish Python package
run-name: Publish orcestr-auth - ${{ github.ref_name }}

on:
  push:
    tags:
      - 'python-v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify Python release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - id: release
        name: Resolve release version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#python-v}" >> "$GITHUB_OUTPUT"
      - uses: astral-sh/setup-uv@v6
      - name: Check package version against tag
        shell: bash
        env:
          EXPECTED: ${{ steps.release.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          expected = os.environ["EXPECTED"]
          actual = tomllib.loads(
              pathlib.Path("backend/pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          assert actual == expected, (actual, expected)
          PY
      - name: Test and build
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pytest -q
          uv build --no-sources

  publish:
    name: Publish orcestr-auth to PyPI
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v6
      - name: Build
        working-directory: backend
        run: uv build --no-sources
      - name: Publish
        working-directory: backend
        run: uv publish --trusted-publishing always

  github-release:
    name: Create Python GitHub release
    needs: [verify, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "orcestr-auth v${VERSION}" \
            --notes "PyPI: https://pypi.org/project/orcestr-auth/${VERSION}/" \
            --generate-notes
