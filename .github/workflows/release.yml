name: Publish Python package
run-name: Publish orcestr-auth - ${{ inputs.version && format('python-v{0}', inputs.version) || github.ref_name }}

on:
  push:
    tags:
      - 'python-v*'
  workflow_dispatch:
    inputs:
      version:
        description: Existing python-vX.Y.Z tag version to publish
        required: true
        type: string

permissions:
  contents: read

jobs:
  verify:
    name: Verify Python release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - id: release
        name: Resolve release version
        shell: bash
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "workflow_dispatch" ]]; then
            version="$DISPATCH_VERSION"
          else
            version="${GITHUB_REF_NAME#python-v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Unsupported release version: $version" >&2
            exit 1
          fi

          echo "tag=python-v${version}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Check package version against tag
        shell: bash
        env:
          EXPECTED: ${{ steps.release.outputs.version }}
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          expected = os.environ["EXPECTED"]
          actual = tomllib.loads(
              pathlib.Path("backend/pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          assert actual == expected, (actual, expected)
          PY
      - name: Test and build
        working-directory: backend
        run: |
          uv sync --frozen
          uv run pytest -q
          uv build --no-sources

  publish:
    name: Publish orcestr-auth to PyPI
    needs: verify
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.verify.outputs.tag }}
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Build
        working-directory: backend
        run: uv build --no-sources
      - name: Publish
        working-directory: backend
        run: uv publish --trusted-publishing always

  github-release:
    name: Create Python GitHub release
    needs: [verify, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.verify.outputs.tag }}
          VERSION: ${{ needs.verify.outputs.version }}
        run: |
          gh release create "$TAG" \
            --verify-tag \
            --title "orcestr-auth v${VERSION}" \
            --notes "PyPI: https://pypi.org/project/orcestr-auth/${VERSION}/" \
            --generate-notes
